version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: skymind-postgres
    environment:
      POSTGRES_USER: skymind_user
      POSTGRES_PASSWORD: skymind_password
      POSTGRES_DB: skymind_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skymind_user -d skymind_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: skymind-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7-alpine
    container_name: skymind-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: skymind_admin
      DOCKER_INFLUXDB_INIT_PASSWORD: skymind_admin_password123
      DOCKER_INFLUXDB_INIT_ORG: skymind_org
      DOCKER_INFLUXDB_INIT_BUCKET: telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: skymind_secret_token_dev_only
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2

volumes:
  postgres_data:
  redis_data:
  influxdb_data:
  influxdb_config:
